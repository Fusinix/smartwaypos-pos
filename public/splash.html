<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f172a; /* Sleek Dark Slate */
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-app-region: drag; /* Allows moving the splash screen */
        }
        .logo {
            width: 120px;
            height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.3));
            animation: pulse 2s infinite ease-in-out;
        }
        .title {
            margin-top: 24px;
            color: white;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-style: italic;
        }
        .loading-bar {
            margin-top: 24px;
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }
        .loading-bar::after {
            content: '';
            position: absolute;
            left: -50%;
            width: 50%;
            height: 100%;
            background: #3b82f6;
            border-radius: 2px;
            animation: loading 1.5s infinite linear;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        @keyframes loading {
            from { left: -50%; }
            to { left: 100%; }
        }
    </style>
</head>
<body>
    <img src="images/logo.png" class="logo" alt="Logo">
    <div class="title">Smartway<span style="color: #3b82f6">POS</span></div>
    <div class="loading-bar"></div>
</body>
</html>
